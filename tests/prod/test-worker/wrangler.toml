name = "cloudflare-parallel-prod-tests"
main = "src/index.ts"
# Compatibility date 2025-11-17+ enables `ctx.exports.<WorkerEntrypoint>`
# loopback bindings by default — no extra flag needed.
# https://developers.cloudflare.com/workers/configuration/compatibility-flags/#enable-ctxexports
compatibility_date = "2026-01-20"

[[worker_loaders]]
binding = "LOADER"

[[durable_objects.bindings]]
name = "CfpCoordinator"
class_name = "CfpCoordinator"

[[durable_objects.bindings]]
name = "CfpWorkerDO"
class_name = "CfpWorkerDO"

[[durable_objects.bindings]]
name = "CfpSubCoord"
class_name = "CfpSubCoord"

[[durable_objects.bindings]]
name = "CfpSchedulerDO"
class_name = "CfpSchedulerDO"

[[migrations]]
tag = "v1-cfp"
new_sqlite_classes = [
  "CfpCoordinator",
  "CfpWorkerDO",
  "CfpSubCoord",
  "CfpSchedulerDO",
]

[vars]
VM_TOKEN = "dev-prod-test-token-min-16-chars-please"
